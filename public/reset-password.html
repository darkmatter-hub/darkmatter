<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password: DarkMatter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f8f9fa; --bg3:#f1f3f5;
      --border:#e5e7eb;
      --text:#111827; --text2:#4b5563; --text3:#9ca3af;
      --accent:#58a6ff; --green:#3fb950; --red:#f85149;
      --mono:'IBM Plex Mono',monospace; --sans:'Inter',sans-serif; --display:'Space Grotesk',sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }
    header { background:var(--bg2); border-bottom:1px solid var(--border); height:66px; display:flex; align-items:center; padding:0 2rem; }
    .logo { display:flex; align-items:center; gap:0.8rem; text-decoration:none; }
    .logo-mark { width:38px; height:38px; }
    .logo-words { display:flex; flex-direction:column; line-height:1.2; }
    .matter-grad { background:linear-gradient(90deg,#7C3AED 0%,#2563EB 55%,#22D3EE 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-name { font-weight:700; font-size:1.25rem; color:var(--text); letter-spacing:-0.02em; font-family:var(--display); }
    .logo-name em { font-style:normal; color:var(--accent); }
    .logo-sub { font-family:var(--mono); font-size:0.56rem; color:var(--text3); letter-spacing:0.08em; }
    .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; width:100%; max-width:380px; overflow:hidden; }
    .card-head { padding:1.5rem 1.5rem 0; }
    .card-title { font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
    .card-sub { font-size:0.82rem; color:var(--text2); }
    .card-body { padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .field { display:flex; flex-direction:column; gap:0.35rem; }
    .field label { font-size:0.78rem; font-weight:600; color:var(--text2); }
    .field input { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:0.6rem 0.8rem; color:var(--text); font-family:var(--sans); font-size:0.85rem; outline:none; transition:border-color 0.15s; }
    .field input:focus { border-color:var(--accent); }
    .field input::placeholder { color:var(--text3); }
    .submit-btn { background:var(--accent); color:#ffffff; font-weight:700; font-size:0.85rem; padding:0.65rem 1rem; border-radius:6px; border:none; cursor:pointer; transition:filter 0.15s; width:100%; font-family:var(--sans); }
    .submit-btn:hover { filter:brightness(1.1); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .error-msg { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); border-radius:6px; padding:0.6rem 0.8rem; font-size:0.78rem; color:var(--red); display:none; }
    .success-msg { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); border-radius:6px; padding:0.6rem 0.8rem; font-size:0.78rem; color:var(--green); display:none; }
    .footer-link { text-align:center; font-size:0.78rem; color:var(--text2); padding-bottom:1.25rem; }
    .footer-link a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <div class="logo-mark">
<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="55%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#22D3EE"/>
          </linearGradient>
        </defs>
        <circle cx="20" cy="20" r="17" stroke="#e5e7eb" stroke-width="0.8" stroke-dasharray="2 3"/>
        <circle cx="20" cy="20" r="12" stroke="#d1d5db" stroke-width="0.5" opacity="0.6"/>
        <circle cx="20" cy="5"  r="3.2" fill="#7C3AED" opacity="0.95"/>
        <circle cx="20" cy="5"  r="5.5" stroke="#7C3AED" stroke-width="0.4" opacity="0.2"/>
        <circle cx="33" cy="28" r="2.6" fill="#2563EB" opacity="0.95"/>
        <circle cx="33" cy="28" r="4.5" stroke="#2563EB" stroke-width="0.4" opacity="0.2"/>
        <circle cx="7"  cy="28" r="2.2" fill="#0891b2" opacity="0.9"/>
        <circle cx="7"  cy="28" r="3.8" stroke="#22D3EE" stroke-width="0.4" opacity="0.2"/>
        <line x1="20" y1="8"  x2="31" y2="26" stroke="url(#lg)" stroke-width="0.6" opacity="0.5"/>
        <line x1="20" y1="8"  x2="9"  y2="26" stroke="#7C3AED" stroke-width="0.6" opacity="0.4"/>
        <line x1="30" y1="27" x2="10" y2="27" stroke="#22D3EE" stroke-width="0.6" opacity="0.4"/>
        <circle cx="20" cy="20" r="2.5" fill="url(#lg)" opacity="0.6"/>
      </svg>
    </div>
    <div class="logo-words">
      <div class="logo-name">Dark<span class="matter-grad">Matter</span></div>
      <div class="logo-sub">agent context network</div>
    </div>
  </a>
</header>

<div class="wrap">
  <div class="card">
    <div class="card-head">
      <div class="card-title" id="page-title">Reset your password</div>
      <div class="card-sub" id="page-sub">Enter your new password below</div>
    </div>
    <div class="card-body">
      <div class="error-msg"   id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <div class="field" id="password-field">
        <label>New password</label>
        <input type="password" id="password" placeholder="8+ characters" autocomplete="new-password" />
      </div>

      <div class="field" id="confirm-field">
        <label>Confirm new password</label>
        <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="submit-btn" id="submit-btn" onclick="handleReset()">Set new password</button>

      <div class="footer-link">
        <a href="/login">← Back to sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
  // Extract token from URL hash (Supabase sends it here)
  const hash   = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token  = params.get('access_token');
  const type   = params.get('type');

  // If no token, show error
  if (!token) {
    document.getElementById('page-title').textContent = 'Invalid reset link';
    document.getElementById('page-sub').textContent   = 'This link is invalid or has expired.';
    document.getElementById('password-field').style.display = 'none';
    document.getElementById('confirm-field').style.display  = 'none';
    document.getElementById('submit-btn').style.display     = 'none';
  }

  async function handleReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('submit-btn');

    if (!password || password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }
    if (password !== confirm) {
      showError('Passwords do not match.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Updating...';

    try {
      const res  = await fetch('/auth/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token, password }),
      });
      const data = await res.json();

      if (data.error) {
        showError(data.error);
        btn.disabled    = false;
        btn.textContent = 'Set new password';
        return;
      }

      showSuccess('Password updated. Redirecting to sign in...');
      document.getElementById('password-field').style.display = 'none';
      document.getElementById('confirm-field').style.display  = 'none';
      btn.style.display = 'none';
      setTimeout(() => window.location.href = '/login', 2000);
    } catch(e) {
      showError('Something went wrong. Please try again.');
      btn.disabled    = false;
      btn.textContent = 'Set new password';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent  = msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent  = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }
</script>
</body>
</html>
