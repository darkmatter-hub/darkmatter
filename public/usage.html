<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkMatter: SDK Usage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f6f7f9; color: #111; min-height: 100vh; padding: 40px 32px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #888; font-family: monospace; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 20px 22px; }
  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #888; margin-bottom: 8px; font-family: monospace; }
  .card-value { font-size: 32px; font-weight: 700; color: #111; line-height: 1; }
  .card-sub { font-size: 12px; color: #888; margin-top: 6px; }
  .section { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 20px 22px; margin-bottom: 16px; }
  .section h2 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: #444; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .bar-label { width: 90px; color: #555; font-family: monospace; font-size: 11px; }
  .bar-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: #6b4fbb; }
  .bar-fill.green { background: #0f7b4d; }
  .bar-fill.blue  { background: #2563eb; }
  .bar-count { width: 50px; text-align: right; font-size: 12px; color: #888; font-family: monospace; }
  .note { font-size: 11px; color: #aaa; font-family: monospace; margin-top: 16px; }
  .refresh { font-size: 12px; color: #6b4fbb; cursor: pointer; text-decoration: underline; }
  #error { color: #c0392b; font-size: 14px; padding: 20px; background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; }
</style>
</head>
<body>

<h1>DarkMatter — Usage</h1>
<div class="sub">Admin only · <span class="refresh" onclick="load()">Refresh</span> · <span id="ts"></span></div>

<div id="error" style="display:none;"></div>
<div id="content" style="display:none;">

  <div class="grid">
    <div class="card">
      <div class="card-label">Total commits</div>
      <div class="card-value" id="total-commits">—</div>
    </div>
    <div class="card">
      <div class="card-label">Unique agents</div>
      <div class="card-value" id="unique-agents">—</div>
    </div>
    <div class="card">
      <div class="card-label">L3 adoption</div>
      <div class="card-value" id="l3-pct">—</div>
      <div class="card-sub" id="l3-count"></div>
    </div>
    <div class="card">
      <div class="card-label">Active agents (7d)</div>
      <div class="card-value" id="active-7d">—</div>
      <div class="card-sub" id="active-30d"></div>
    </div>
    <div class="card">
      <div class="card-label">New agents (7d)</div>
      <div class="card-value" id="new-agents-7d">—</div>
      <div class="card-sub">acquisition signal</div>
    </div>
    <div class="card">
      <div class="card-label">New L3 commits (7d)</div>
      <div class="card-value" id="new-l3-7d">—</div>
      <div class="card-sub">L3 momentum</div>
    </div>
  </div>

  <div class="section">
    <h2>Wrapper usage</h2>
    <div class="bar-row">
      <div class="bar-label">Anthropic</div>
      <div class="bar-track"><div class="bar-fill green" id="bar-anthropic" style="width:0%"></div></div>
      <div class="bar-count" id="cnt-anthropic">0</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">OpenAI</div>
      <div class="bar-track"><div class="bar-fill blue" id="bar-openai" style="width:0%"></div></div>
      <div class="bar-count" id="cnt-openai">0</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">Manual</div>
      <div class="bar-track"><div class="bar-fill" id="bar-manual" style="width:0%;background:#ccc;"></div></div>
      <div class="bar-count" id="cnt-manual">0</div>
    </div>
    <div class="note" id="wrapper-note"></div>
  </div>

  <div class="section">
    <h2>Commits per agent</h2>
    <div class="bar-row">
      <div class="bar-label">Median (p50)</div>
      <div class="bar-track"><div class="bar-fill" id="bar-p50" style="width:0%"></div></div>
      <div class="bar-count" id="cnt-p50">0</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">p90</div>
      <div class="bar-track"><div class="bar-fill" id="bar-p90" style="width:0%"></div></div>
      <div class="bar-count" id="cnt-p90">0</div>
    </div>
    <div class="card-sub" id="agents-with-commits" style="margin-top:8px;"></div>
  </div>

  <div class="note" id="note-bottom"></div>

</div>

<script>
  // Get session from localStorage — try all known key patterns
  function getToken() {
    try {
      // Try dm_session first (DarkMatter's own key)
      const dmRaw = localStorage.getItem('dm_session');
      if (dmRaw) {
        const s = JSON.parse(dmRaw);
        const t = s?.access_token || s?.session?.access_token;
        if (t) return t;
      }
      // Try any Supabase auth key (project-agnostic)
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.includes('auth-token')) {
          const raw = localStorage.getItem(key);
          if (raw) {
            const s = JSON.parse(raw);
            const t = s?.access_token || s?.session?.access_token;
            if (t) return t;
          }
        }
      }
      return null;
    } catch { return null; }
  }

  async function load() {
    document.getElementById('ts').textContent = 'Loading…';
    const token = getToken();
    if (!token) {
      document.getElementById('error').style.display = '';
      document.getElementById('error').textContent = 'Not signed in. Go to /dashboard first, then return here.';
      document.getElementById('ts').textContent = 'Not signed in';
      return;
    }
    try {
      const res  = await fetch('/api/workspace/stats/usage', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const text = await res.text();
      if (!res.ok) {
        document.getElementById('error').style.display = '';
        document.getElementById('error').textContent = 'Error ' + res.status + ': ' + text;
        document.getElementById('ts').textContent = 'Error';
        return;
      }
      const d = JSON.parse(text);
      render(d);
    } catch(e) {
      document.getElementById('error').style.display = '';
      document.getElementById('error').textContent = 'Fetch error: ' + e.message;
      document.getElementById('ts').textContent = 'Failed';
    }
  }

  function render(d) {
    document.getElementById('content').style.display = '';
    document.getElementById('error').style.display   = 'none';

    document.getElementById('total-commits').textContent  = d.total_commits.toLocaleString();
    document.getElementById('unique-agents').textContent  = d.unique_agents.toLocaleString();
    document.getElementById('l3-pct').textContent         = d.l3_usage.percent + '%';
    document.getElementById('l3-count').textContent       = d.l3_usage.count.toLocaleString() + ' L3 commits';
    document.getElementById('active-7d').textContent      = d.active_agents.last_7d;
    document.getElementById('active-30d').textContent     = d.active_agents.last_30d + ' active last 30d';
    document.getElementById('new-agents-7d').textContent  = d.momentum?.new_agents_7d ?? '—';
    document.getElementById('new-l3-7d').textContent      = d.l3_usage?.last_7d ?? '—';

    const wu    = d.wrapper_usage;
    const total = wu.anthropic + wu.openai + wu.manual || 1;
    document.getElementById('bar-anthropic').style.width = (wu.anthropic / total * 100) + '%';
    document.getElementById('bar-openai').style.width    = (wu.openai    / total * 100) + '%';
    document.getElementById('bar-manual').style.width    = (wu.manual    / total * 100) + '%';
    document.getElementById('cnt-anthropic').textContent = wu.anthropic;
    document.getElementById('cnt-openai').textContent    = wu.openai;
    document.getElementById('cnt-manual').textContent    = wu.manual;
    document.getElementById('wrapper-note').textContent  = d._note || '';

    const cp = d.commits_per_agent;
    const maxP = cp.p90 || 1;
    document.getElementById('bar-p50').style.width = (cp.p50 / maxP * 100) + '%';
    document.getElementById('bar-p90').style.width = '100%';
    document.getElementById('cnt-p50').textContent = cp.p50;
    document.getElementById('cnt-p90').textContent = cp.p90;
    document.getElementById('agents-with-commits').textContent =
      cp.total_agents_with_commits + ' agents with at least 1 commit';

    if (d.momentum?.first_commit_at) {
      const first = new Date(d.momentum.first_commit_at);
      const last  = new Date(d.momentum.last_commit_at);
      // Guard against Unix epoch (0) or invalid dates
      const validFirst = first.getFullYear() > 2020;
      const validLast  = last.getFullYear()  > 2020;
      if (validFirst || validLast) {
        document.getElementById('note-bottom').textContent =
          (validFirst ? 'First commit: ' + first.toLocaleDateString() : '') +
          (validFirst && validLast ? '  ·  ' : '') +
          (validLast  ? 'Last commit: '  + last.toLocaleString() : '');
      }
    }

    document.getElementById('ts').textContent = 'Updated ' + new Date(d._generated_at).toLocaleTimeString();
  }

  load();
</script>
</body>
</html>
