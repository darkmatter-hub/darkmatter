<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Select an organization — DarkMatter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0a0e1a;--ink2:#2d3552;--ink3:#5a6480;--ink4:#9199b0;
  --bg:#f4f6fb;--bg2:#fff;--border:#e5e7eb;
  --blue:#3b82f6;--red:#ef4444;--green:#10b981;
  --mono:"IBM Plex Mono","Courier New",monospace;
  --sans:"IBM Plex Sans",sans-serif;
}
body{background:#fff;color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
.page{max-width:760px;margin:0 auto;padding:48px 32px;}
.page-title{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:8px;}
.page-sub{font-size:.875rem;color:var(--ink3);margin-bottom:4px;}
.page-sub a{color:var(--blue);text-decoration:none;}
.page-sub a:hover{text-decoration:underline;}
.orgs-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:32px;}
.orgs-header{padding:16px 20px;border-bottom:1px solid var(--border);}
.orgs-header-title{font-size:.9rem;font-weight:600;color:var(--ink);}
.org-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
.org-row:last-child{border-bottom:none;}
.org-row:hover{background:var(--bg);}
.org-info{display:flex;flex-direction:column;gap:3px;}
.org-name{font-size:.9rem;font-weight:600;color:var(--ink);}
.org-meta{font-size:.8rem;color:var(--ink3);}
.org-btn{font-family:var(--sans);font-size:.82rem;padding:6px 16px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap;}
.org-btn:hover{border-color:var(--ink3);color:var(--ink);}
.org-btn.current{background:var(--bg);color:var(--ink3);cursor:default;}
.empty{padding:40px 20px;text-align:center;color:var(--ink4);font-size:.875rem;}
.loading{padding:40px 20px;text-align:center;color:var(--ink4);font-family:var(--mono);font-size:.82rem;}

/* ── DM NAV ── */
.dm-nav{position:sticky;top:0;z-index:300;height:60px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 40px;}
.dm-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;z-index:1;}
.dm-nav-name{font-family:var(--mono,'IBM Plex Mono',monospace);font-size:17px;font-weight:700;color:#111827;letter-spacing:-0.03em;}
.dm-nav-grad{background:linear-gradient(90deg,#7C3AED,#2563EB,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.dm-nav-links{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;list-style:none;}
.dm-nav-links a{font-size:13.5px;color:#6b7280;padding:5px 10px;border-radius:6px;transition:color .12s,background .12s;white-space:nowrap;text-decoration:none;}
.dm-nav-links a:hover{color:#111827;background:#f3f4f6;}
.dm-nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;z-index:1;}
.dm-nav-cta{font-family:var(--mono,'IBM Plex Mono',monospace);font-size:12.5px;font-weight:700;background:#111827;color:#fff;padding:8px 18px;border-radius:7px;text-decoration:none;transition:opacity .15s;}
.dm-nav-cta:hover{opacity:.85;}
/* ── DM FOOTER ── */
.dm-footer{border-top:1px solid #e5e7eb;padding:28px 40px;display:flex;align-items:center;flex-wrap:wrap;gap:16px;}
.dm-footer-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.dm-footer-name{font-family:var(--mono,'IBM Plex Mono',monospace);font-size:14px;font-weight:700;color:#111827;letter-spacing:-.02em;}
.dm-footer-links{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-left:auto;}
.dm-footer-links a{font-size:12.5px;color:#9ca3af;padding:3px 8px;text-decoration:none;transition:color .12s;}
.dm-footer-links a:hover{color:#374151;}
.dm-footer-copy{font-size:12px;color:#d1d5db;padding:3px 8px;}
@media(max-width:768px){.dm-nav{padding:0 16px;}.dm-nav-links{display:none;}.dm-footer{padding:20px 16px;}.dm-footer-links{margin-left:0;}}

</style>
</head>
<body>
<div class="page">
  <h1 class="page-title">Select an organization</h1>
  <p class="page-sub" id="signed-in-as"></p>
  <p class="page-sub">Need help? <a href="/docs">Read the docs</a>.</p>

  <div class="orgs-card">
    <div class="orgs-header">
      <div class="orgs-header-title">Your organizations</div>
    </div>
    <div id="orgs-list">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<script>
function getSession() { try{return JSON.parse(localStorage.getItem('dm_session')||'null');}catch{return null;} }
function getAuthHeaders() {
  const s = getSession();
  if (!s?.access_token) return {};
  return { 'Authorization': 'Bearer ' + s.access_token, 'X-Refresh-Token': s.refresh_token || '' };
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function init() {
  const session = getSession();
  if (!session?.access_token) { window.location.href = '/login'; return; }

  const email = session.user?.email || '';
  document.getElementById('signed-in-as').innerHTML =
    `Signed in as ${escHtml(email)}. <a href="#" onclick="signOut()">Sign out</a>`;

  try {
    const res = await fetch('/api/workspace/my-organizations', { headers: getAuthHeaders() });
    if (!res.ok) { renderOrgs([]); return; }
    const data = await res.json();
    renderOrgs(data.organizations || []);
  } catch(e) {
    renderOrgs([]);
  }
}

function renderOrgs(orgs) {
  const container = document.getElementById('orgs-list');
  if (!orgs.length) {
    container.innerHTML = '<div class="empty">No organizations yet. <a href="/dashboard" style="color:var(--blue);">Go to dashboard</a></div>';
    return;
  }
  container.innerHTML = orgs.map(org => `
    <div class="org-row" onclick="selectOrg('${escHtml(org.id)}')">
      <div class="org-info">
        <div class="org-name">${escHtml(org.email || org.name || 'Organization')}</div>
        <div class="org-meta">${escHtml(org.role_label || (org.role === 'owner' ? 'Owner - current' : org.role))} ${org.is_current ? '- current' : ''}</div>
      </div>
      <button class="org-btn ${org.is_current ? 'current' : ''}" onclick="event.stopPropagation();selectOrg('${escHtml(org.id)}')">${org.is_current ? 'Current organization' : 'Switch'}</button>
    </div>`).join('');
}

function selectOrg(id) {
  window.location.href = '/dashboard';
}

function signOut() {
  localStorage.removeItem('dm_session');
  window.location.href = '/login';
}

init();
</script>
<footer class="dm-footer">
  <a class="dm-footer-brand" href="/">
    <svg style="width:22px;height:22px;flex-shrink:0;" viewBox="0 0 40 40" fill="none">
      <defs><linearGradient id="dlg-f" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C3AED"/><stop offset="55%" stop-color="#2563EB"/><stop offset="100%" stop-color="#0891b2"/></linearGradient></defs>
      <circle cx="20" cy="20" r="17" stroke="#e5e7eb" stroke-width="0.8" stroke-dasharray="2 3"/>
      <circle cx="20" cy="20" r="12" stroke="#d1d5db" stroke-width="0.5" opacity="0.6"/>
      <circle cx="20" cy="5"  r="3.2" fill="#7C3AED" opacity="0.95"/>
      <circle cx="33" cy="28" r="2.6" fill="#2563EB" opacity="0.95"/>
      <circle cx="7"  cy="28" r="2.2" fill="#22D3EE" opacity="0.9"/>
      <line x1="20" y1="8" x2="31" y2="26" stroke="url(#dlg-f)" stroke-width="0.6" opacity="0.5"/>
      <line x1="20" y1="8" x2="9"  y2="26" stroke="#7C3AED" stroke-width="0.6" opacity="0.4"/>
      <line x1="30" y1="27" x2="10" y2="27" stroke="#22D3EE" stroke-width="0.6" opacity="0.4"/>
      <circle cx="20" cy="20" r="2.5" fill="url(#dlg-f)" opacity="0.6"/>
    </svg>
    <span class="dm-footer-name">Dark<span class="dm-nav-grad">Matter</span></span>
  </a>
  <div class="dm-footer-links">
    <a href="/demo">Demo</a>
    <a href="/docs">Docs</a>
    <a href="/pricing">Pricing</a>
    <a href="/integrity">Integrity</a>
    <a href="/blog">Blog</a>
    <a href="/enterprise">Enterprise</a>
    <a href="/security">Security</a>
    <a href="/compare">Compare</a>
    <a href="https://contextpassport.com" target="_blank">Context Passport</a>
    <a href="https://github.com/darkmatter-hub/darkmatter" target="_blank">GitHub</a>
    <span class="dm-footer-copy">© 2026 DarkMatter</span>
  </div>
</footer>
</body>
</html>
