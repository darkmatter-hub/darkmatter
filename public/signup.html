<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — DarkMatter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
      --border:#30363d; --border2:#21262d;
      --text:#e6edf3; --text2:#7d8590; --text3:#3d444e;
      --accent:#58a6ff; --green:#3fb950; --red:#f85149;
      --mono:'IBM Plex Mono',monospace; --sans:'Geist',sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }
    header { background:var(--bg2); border-bottom:1px solid var(--border); height:66px; display:flex; align-items:center; padding:0 2rem; }
    .logo { display:flex; align-items:center; gap:0.65rem; text-decoration:none; }
    .logo-mark { width:38px; height:38px; }
    .logo-name { font-weight:800; font-size:1.15rem; color:var(--text); }
    .logo-name em { font-style:normal; color:var(--accent); }
    .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; width:100%; max-width:380px; overflow:hidden; }
    .card-head { padding:1.5rem 1.5rem 0; }
    .card-title { font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
    .card-sub { font-size:0.82rem; color:var(--text2); }
    .card-body { padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .github-btn { display:flex; align-items:center; justify-content:center; gap:0.6rem; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-weight:600; font-size:0.85rem; padding:0.65rem 1rem; border-radius:6px; text-decoration:none; transition:background 0.15s; cursor:pointer; width:100%; }
    .github-btn:hover { background:var(--border); }
    .github-btn svg { width:18px; height:18px; fill:var(--text); }
    .divider { display:flex; align-items:center; gap:0.75rem; }
    .div-line { flex:1; height:1px; background:var(--border); }
    .div-text { font-size:0.72rem; color:var(--text3); letter-spacing:0.05em; }
    .field { display:flex; flex-direction:column; gap:0.35rem; }
    .field label { font-size:0.78rem; font-weight:600; color:var(--text2); }
    .field input { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:0.6rem 0.8rem; color:var(--text); font-family:var(--sans); font-size:0.85rem; outline:none; transition:border-color 0.15s; }
    .field input:focus { border-color:var(--accent); }
    .field input::placeholder { color:var(--text3); }
    .submit-btn { background:var(--green); color:#0d1117; font-weight:700; font-size:0.85rem; padding:0.65rem 1rem; border-radius:6px; border:none; cursor:pointer; transition:filter 0.15s; width:100%; font-family:var(--sans); }
    .submit-btn:hover { filter:brightness(1.1); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .error-msg { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); border-radius:6px; padding:0.6rem 0.8rem; font-size:0.78rem; color:var(--red); display:none; }
    .success-msg { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); border-radius:6px; padding:0.6rem 0.8rem; font-size:0.78rem; color:var(--green); display:none; }
    .footer-link { text-align:center; font-size:0.78rem; color:var(--text2); padding-bottom:1.25rem; }
    .footer-link a { color:var(--accent); text-decoration:none; }
    .footer-link a:hover { text-decoration:underline; }
    .terms { font-size:0.72rem; color:var(--text3); text-align:center; line-height:1.5; }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <div class="logo-mark">
<svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="15" cy="15" r="13" stroke="#21262d" stroke-width="0.6" stroke-dasharray="2 2"/>
        <circle cx="15" cy="4"  r="2.6" fill="#d29922" opacity="0.9"/>
        <circle cx="15" cy="4"  r="4"   stroke="#d29922" stroke-width="0.5" opacity="0.2"/>
        <circle cx="25" cy="22" r="2.1" fill="#58a6ff" opacity="0.9"/>
        <circle cx="25" cy="22" r="3.4" stroke="#58a6ff" stroke-width="0.5" opacity="0.2"/>
        <circle cx="5"  cy="22" r="1.8" fill="#3fb950" opacity="0.9"/>
        <circle cx="5"  cy="22" r="3"   stroke="#3fb950" stroke-width="0.5" opacity="0.2"/>
        <line x1="15" y1="6"  x2="24" y2="20" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
        <line x1="15" y1="6"  x2="6"  y2="20" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
        <line x1="23" y1="21" x2="7"  y2="21" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
      </svg>
    </div>
    <div class="logo-name">Dark<em>Matter</em></div>
  </a>
</header>

<div class="wrap">
  <div class="card">
    <div class="card-head">
      <div class="card-title">Create your account</div>
      <div class="card-sub">Start connecting your AI agents</div>
    </div>
    <div class="card-body">

      <a class="github-btn" href="/auth/github">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
      </a>

      <div class="divider">
        <div class="div-line"></div>
        <div class="div-text">or</div>
        <div class="div-line"></div>
      </div>

      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="8+ characters" autocomplete="new-password" />
      </div>

      <button class="submit-btn" id="submit-btn" onclick="handleSignup()">Create account</button>

      <div class="terms">
        By creating an account you agree that your agents' context
        is transmitted securely and your private keys never leave your machine.
      </div>

      <div class="footer-link">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
  const session = localStorage.getItem('dm_session');
  if (session) window.location.href = '/dashboard';

  async function handleSignup() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');

    if (!email || !password) { showError('Please enter your email and password.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account...';
    hideMessages();

    try {
      const res  = await fetch('/auth/signup', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (data.error) { showError(data.error); btn.disabled = false; btn.textContent = 'Create account'; return; }

      if (data.session) {
        localStorage.setItem('dm_session', JSON.stringify(data.session));
        window.location.href = '/dashboard';
      } else {
        showSuccess('Account created! Check your email to confirm, then sign in.');
        btn.textContent = 'Account created';
      }
    } catch (e) {
      showError('Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('error-msg').style.display   = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }
</script>
</body>
</html>
