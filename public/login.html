<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign In — DarkMatter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --ink:#0a0e1a;--ink2:#2d3552;--ink3:#5a6480;--ink4:#9199b0;
    --bg:#f4f6fb;--bg2:#fff;--border:#e5e7eb;
    --blue:#3b82f6;--red:#ef4444;--green:#10b981;
    --mono:"IBM Plex Mono","Courier New",monospace;
    --sans:"IBM Plex Sans",sans-serif;
    --grad:linear-gradient(90deg,#7C3AED,#2563EB,#0891b2);
  }
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
  /* NAV */
  .dm-nav{position:sticky;top:0;z-index:300;height:60px;background:#fff;
    border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 40px;}
  .dm-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
  .dm-nav-name{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-0.03em;}
  .dm-nav-grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .dm-nav-links{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;list-style:none;}
  .dm-nav-links a{font-size:13.5px;color:var(--ink3);padding:5px 10px;border-radius:6px;text-decoration:none;transition:color .12s,background .12s;}
  .dm-nav-links a:hover{color:var(--ink);background:#f3f4f6;}
  .dm-nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .dm-nav-cta{font-family:var(--mono);font-size:12.5px;font-weight:700;background:var(--ink);color:#fff;padding:8px 18px;border-radius:7px;text-decoration:none;transition:opacity .15s;}
  .dm-nav-cta:hover{opacity:.85;}
  @media(max-width:768px){.dm-nav{padding:0 16px;}.dm-nav-links{display:none;}}
  /* BODY */
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;width:100%;max-width:380px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);}
  .card-head{padding:1.5rem 1.5rem 0;}
  .card-title{font-size:1.15rem;font-weight:700;color:var(--ink);margin-bottom:.3rem;letter-spacing:-.02em;}
  .card-sub{font-size:.82rem;color:var(--ink3);}
  .card-body{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
  .field{display:flex;flex-direction:column;gap:.35rem;}
  .field label{font-size:.78rem;font-weight:600;color:var(--ink2);}
  .field input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.6rem .8rem;color:var(--ink);font-family:var(--sans);font-size:.85rem;outline:none;transition:border-color .15s;width:100%;}
  .field input:focus{border-color:var(--blue);background:#fff;}
  .field input::placeholder{color:var(--ink4);}
  .submit-btn{background:var(--ink);color:#fff;font-family:var(--mono);font-weight:700;font-size:.85rem;padding:.7rem 1rem;border-radius:7px;border:none;cursor:pointer;transition:opacity .15s;width:100%;}
  .submit-btn:hover{opacity:.85;}
  .submit-btn:disabled{opacity:.45;cursor:not-allowed;}
  .forgot-btn{font-size:.78rem;color:var(--blue);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:0;text-align:right;transition:opacity .15s;}
  .forgot-btn:hover{opacity:.7;}
  .error-msg{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);border-radius:6px;padding:.6rem .8rem;font-size:.82rem;color:var(--red);display:none;}
  .footer-lnk{text-align:center;font-size:.78rem;color:var(--ink3);padding-bottom:1.25rem;}
  .footer-lnk a{color:var(--blue);text-decoration:none;}
  .footer-lnk a:hover{text-decoration:underline;}
  /* FOOTER */
  .dm-footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;flex-wrap:wrap;gap:16px;}
  .dm-footer-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
  .dm-footer-name{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
  .dm-footer-links{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-left:auto;}
  .dm-footer-links a{font-size:12.5px;color:var(--ink4);text-decoration:none;padding:3px 8px;transition:color .12s;}
  .dm-footer-links a:hover{color:var(--ink2);}
  .dm-footer-copy{font-size:12px;color:#d1d5db;padding:3px 8px;}
  @media(max-width:768px){.dm-footer{padding:20px 16px;}.dm-footer-links{margin-left:0;}}
  </style>
</head>
<body>

<nav class="dm-nav">
  <a class="dm-nav-logo" href="/">
    <svg style="width:28px;height:28px;flex-shrink:0;" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <defs><linearGradient id="dlg-l" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C3AED"/><stop offset="55%" stop-color="#2563EB"/><stop offset="100%" stop-color="#0891b2"/></linearGradient></defs>
      <circle cx="20" cy="20" r="17" stroke="#e5e7eb" stroke-width="0.8" stroke-dasharray="2 3"/>
      <circle cx="20" cy="20" r="12" stroke="#d1d5db" stroke-width="0.5" opacity="0.6"/>
      <circle cx="20" cy="5"  r="3.2" fill="#7C3AED" opacity="0.95"/>
      <circle cx="33" cy="28" r="2.6" fill="#2563EB" opacity="0.95"/>
      <circle cx="7"  cy="28" r="2.2" fill="#22D3EE" opacity="0.9"/>
      <line x1="20" y1="8" x2="31" y2="26" stroke="url(#dlg-l)" stroke-width="0.6" opacity="0.5"/>
      <line x1="20" y1="8" x2="9"  y2="26" stroke="#7C3AED" stroke-width="0.6" opacity="0.4"/>
      <line x1="30" y1="27" x2="10" y2="27" stroke="#22D3EE" stroke-width="0.6" opacity="0.4"/>
      <circle cx="20" cy="20" r="2.5" fill="url(#dlg-l)" opacity="0.6"/>
    </svg>
    <span class="dm-nav-name">Dark<span class="dm-nav-grad">Matter</span></span>
  </a>
  <ul class="dm-nav-links">
    <li><a href="/demo">Demo</a></li>
    <li><a href="/docs">Docs</a></li>
    <li><a href="/pricing">Pricing</a></li>
    <li><a href="/compare">Compare</a></li>
    <li><a href="/enterprise">Enterprise</a></li>
    <li><a href="/integrity">Integrity</a></li>
  </ul>
  <div class="dm-nav-right">
    <a href="/signup" class="dm-nav-cta">Start free</a>
  </div>
</nav>

<div class="wrap">
  <div class="card">
    <div class="card-head">
      <div class="card-title">Sign in to DarkMatter</div>
      <div class="card-sub">Access your records and workspace.</div>
    </div>
    <div class="card-body">
      <div id="error-msg" class="error-msg"></div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@yourfirm.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="forgot-btn" onclick="handleForgotPassword()">Forgot your password?</button>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="handleLogin()">Sign in</button>
    </div>
    <div class="footer-lnk">
      Don’t have an account? <a href="/signup">Create one free</a>
    </div>
  </div>
</div>

<footer class="dm-footer">
  <a class="dm-footer-brand" href="/">
    <svg style="width:20px;height:20px;flex-shrink:0;" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <defs><linearGradient id="dlg-lf" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C3AED"/><stop offset="55%" stop-color="#2563EB"/><stop offset="100%" stop-color="#0891b2"/></linearGradient></defs>
      <circle cx="20" cy="20" r="17" stroke="#e5e7eb" stroke-width="0.8" stroke-dasharray="2 3"/>
      <circle cx="20" cy="5" r="3.2" fill="#7C3AED" opacity="0.95"/>
      <circle cx="33" cy="28" r="2.6" fill="#2563EB" opacity="0.95"/>
      <circle cx="7" cy="28" r="2.2" fill="#22D3EE" opacity="0.9"/>
      <line x1="20" y1="8" x2="31" y2="26" stroke="url(#dlg-lf)" stroke-width="0.6" opacity="0.5"/>
      <line x1="20" y1="8" x2="9" y2="26" stroke="#7C3AED" stroke-width="0.6" opacity="0.4"/>
      <line x1="30" y1="27" x2="10" y2="27" stroke="#22D3EE" stroke-width="0.6" opacity="0.4"/>
      <circle cx="20" cy="20" r="2.5" fill="url(#dlg-lf)" opacity="0.6"/>
    </svg>
    <span class="dm-footer-name">Dark<span class="dm-nav-grad">Matter</span></span>
  </a>
  <div class="dm-footer-links">
    <a href="/demo">Demo</a><a href="/docs">Docs</a><a href="/pricing">Pricing</a>
    <a href="/why">Why</a><a href="/blog">Blog</a><a href="/enterprise">Enterprise</a>
    <a href="/security">Security</a><a href="/compare">Compare</a>
    <a href="https://contextpassport.com" target="_blank">Context Passport</a>
    <a href="https://github.com/darkmatter-hub/darkmatter" target="_blank">GitHub</a>
    <span class="dm-footer-copy">© 2026 DarkMatter</span>
  </div>
</footer>

<script>
(function(){
  var raw=localStorage.getItem('dm_session');
  if(!raw)return;
  try{JSON.parse(raw);}catch(e){return;}
  var p=new URLSearchParams(location.search);
  window.location.href=p.get('ext')==='1'?'/ext/callback?ext=1':'/dashboard';
})();

async function handleLogin(){
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('submit-btn');
  var errEl=document.getElementById('error-msg');
  if(!email||!password){showError('Please enter your email and password.');return;}
  btn.disabled=true;btn.textContent='Signing in...';errEl.style.display='none';
  try{
    var res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:password})});
    var data=await res.json();
    if(data.error){showError(data.error);btn.disabled=false;btn.textContent='Sign in';return;}
    localStorage.setItem('dm_session',JSON.stringify(data.session));
    var p=new URLSearchParams(location.search);
    window.location.href=p.get('ext')==='1'?'/ext/callback?ext=1':'/dashboard';
  }catch(e){
    showError('Something went wrong. Please try again.');
    btn.disabled=false;btn.textContent='Sign in';
  }
}

async function handleForgotPassword(){
  var email=document.getElementById('email').value.trim();
  if(!email){showError('Enter your email above, then click Forgot your password.');return;}
  document.getElementById('error-msg').style.display='none';
  try{
    await fetch('/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})});
    showSuccess('If that email exists, a reset link has been sent. Check your inbox.');
  }catch(e){showError('Something went wrong. Please try again.');}
}

function showError(msg){
  var el=document.getElementById('error-msg');
  el.textContent=msg;el.style.display='block';
  var s=document.getElementById('success-msg');if(s)s.style.display='none';
}
function showSuccess(msg){
  var el=document.getElementById('success-msg');
  if(!el){
    el=document.createElement('div');el.id='success-msg';
    el.style.cssText='background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:6px;padding:.6rem .8rem;font-size:.82rem;color:#065f46;margin-bottom:.5rem;';
    document.getElementById('error-msg').before(el);
  }
  el.textContent=msg;el.style.display='block';
  document.getElementById('error-msg').style.display='none';
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')handleLogin();});
</script>
</body>
</html>
