<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — DarkMatter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f8f9fa; --bg3:#f1f3f5;
      --border:#e5e7eb; --border2:#d1d5db;
      --text:#111827; --text2:#4b5563; --text3:#9ca3af;
      --accent:#58a6ff; --green:#3fb950; --red:#f85149;
      --mono:'IBM Plex Mono',monospace; --sans:'Inter',sans-serif; --display:'Space Grotesk',sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }
    header { background:var(--bg2); border-bottom:1px solid var(--border); height:66px; display:flex; align-items:center; padding:0 2rem; }
    .logo { display:flex; align-items:center; gap:0.65rem; text-decoration:none; }
    .logo-mark { width:38px; height:38px; }
    .logo-name { font-weight:700; font-size:1.25rem; color:var(--text); letter-spacing:-0.02em; font-family:var(--display); }
    .matter-grad { background:linear-gradient(90deg,#7C3AED 0%,#2563EB 55%,#22D3EE 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    
    .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; width:100%; max-width:380px; overflow:hidden; }
    .card-head { padding:1.5rem 1.5rem 0; }
    .card-title { font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
    .card-sub { font-size:0.82rem; color:var(--text2); }
    .card-body { padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .github-btn { display:flex; align-items:center; justify-content:center; gap:0.6rem; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-weight:600; font-size:0.85rem; padding:0.65rem 1rem; border-radius:6px; text-decoration:none; transition:background 0.15s; cursor:pointer; width:100%; }
    .github-btn:hover { background:var(--border); }
    .github-btn svg { width:18px; height:18px; fill:var(--text); }
    .divider { display:flex; align-items:center; gap:0.75rem; }
    .div-line { flex:1; height:1px; background:var(--border); }
    .div-text { font-size:0.72rem; color:var(--text3); letter-spacing:0.05em; }
    .field { display:flex; flex-direction:column; gap:0.35rem; }
    .field label { font-size:0.78rem; font-weight:600; color:var(--text2); }
    .field input { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:0.6rem 0.8rem; color:var(--text); font-family:var(--sans); font-size:0.85rem; outline:none; transition:border-color 0.15s; }
    .field input:focus { border-color:var(--accent); }
    .field input::placeholder { color:var(--text3); }
    .submit-btn { background:var(--accent); color:#ffffff; font-weight:700; font-size:0.85rem; padding:0.65rem 1rem; border-radius:6px; border:none; cursor:pointer; transition:filter 0.15s; width:100%; font-family:var(--sans); }
    .submit-btn:hover { filter:brightness(1.1); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .error-msg { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); border-radius:6px; padding:0.6rem 0.8rem; font-size:0.78rem; color:var(--red); display:none; }
    .footer-link { text-align:center; font-size:0.78rem; color:var(--text2); padding-bottom:1.25rem; }
    .footer-link a { color:var(--accent); text-decoration:none; }
    .footer-link a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <div class="logo-mark">
<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="55%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#22D3EE"/>
          </linearGradient>
        </defs>
        <circle cx="20" cy="20" r="17" stroke="#e5e7eb" stroke-width="0.8" stroke-dasharray="2 3"/>
        <circle cx="20" cy="20" r="12" stroke="#d1d5db" stroke-width="0.5" opacity="0.6"/>
        <circle cx="20" cy="5"  r="3.2" fill="#7C3AED" opacity="0.95"/>
        <circle cx="20" cy="5"  r="5.5" stroke="#7C3AED" stroke-width="0.4" opacity="0.2"/>
        <circle cx="33" cy="28" r="2.6" fill="#2563EB" opacity="0.95"/>
        <circle cx="33" cy="28" r="4.5" stroke="#2563EB" stroke-width="0.4" opacity="0.2"/>
        <circle cx="7"  cy="28" r="2.2" fill="#0891b2" opacity="0.9"/>
        <circle cx="7"  cy="28" r="3.8" stroke="#22D3EE" stroke-width="0.4" opacity="0.2"/>
        <line x1="20" y1="8"  x2="31" y2="26" stroke="url(#lg)" stroke-width="0.6" opacity="0.5"/>
        <line x1="20" y1="8"  x2="9"  y2="26" stroke="#7C3AED" stroke-width="0.6" opacity="0.4"/>
        <line x1="30" y1="27" x2="10" y2="27" stroke="#22D3EE" stroke-width="0.6" opacity="0.4"/>
        <circle cx="20" cy="20" r="2.5" fill="url(#lg)" opacity="0.6"/>
      </svg>
    </div>
    <div class="logo-name">Dark<span class="matter-grad">Matter</span></div>
  </a>
</header>

<div class="wrap">
  <div class="card">
    <div class="card-head">
      <div class="card-title">Sign in to DarkMatter</div>
      <div class="card-sub">Manage your agents and API keys</div>
    </div>
    <div class="card-body">

      <a class="github-btn" href="/auth/github">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
      </a>

      <div class="divider">
        <div class="div-line"></div>
        <div class="div-text">or</div>
        <div class="div-line"></div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="submit-btn" id="submit-btn" onclick="handleLogin()">Sign in</button>

      <div style="text-align:center; margin-top:-0.25rem;">
        <button onclick="handleForgotPassword()" style="background:none;border:none;color:var(--text2);font-size:0.75rem;cursor:pointer;font-family:var(--sans);transition:color 0.15s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">
          Forgot your password?
        </button>
      </div>

      <div class="footer-link">
        Don't have an account? <a href="/signup">Sign up</a>
      </div>
    </div>
  </div>
</div>

<script>
  // If already logged in, redirect to dashboard
  const session = localStorage.getItem('dm_session');
  if (session) window.location.href = '/dashboard';

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');
    const errEl    = document.getElementById('error-msg');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    try {
      const res  = await fetch('/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (data.error) {
        showError(data.error);
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }

      localStorage.setItem('dm_session', JSON.stringify(data.session));
      window.location.href = '/dashboard';
    } catch (e) {
      showError('Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  async function handleForgotPassword() {
    const email = document.getElementById('email').value.trim();
    const errEl = document.getElementById('error-msg');

    if (!email) {
      showError('Enter your email address above, then click Forgot your password.');
      return;
    }

    errEl.style.display = 'none';

    try {
      const res  = await fetch('/auth/forgot-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json();

      // Always show success to avoid email enumeration
      showSuccess('If that email exists, a reset link has been sent. Check your inbox.');
    } catch (e) {
      showError('Something went wrong. Please try again.');
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    const suc = document.getElementById('success-msg');
    if (suc) suc.style.display = 'none';
  }

  function showSuccess(msg) {
    let el = document.getElementById('success-msg');
    if (!el) {
      el = document.createElement('div');
      el.id = 'success-msg';
      el.style.cssText = 'background:rgba(63,185,80,0.1);border:1px solid rgba(63,185,80,0.3);border-radius:6px;padding:0.6rem 0.8rem;font-size:0.78rem;color:#3fb950;margin-top:0.5rem;';
      document.getElementById('error-msg').after(el);
    }
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
