<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="55%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#brand)"/>

  <!-- Logo -->
  <circle cx="80" cy="72" r="22" fill="none" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="2 3"/>
  <circle cx="80" cy="72" r="16" fill="none" stroke="#d1d5db" stroke-width="0.6" opacity="0.6"/>
  <circle cx="80" cy="57" r="4.5" fill="#7C3AED" opacity="0.95"/>
  <circle cx="93" cy="82" r="3.8" fill="#2563EB" opacity="0.95"/>
  <circle cx="67" cy="82" r="3.2" fill="#0891b2" opacity="0.9"/>
  <line x1="80" y1="62" x2="91" y2="79" stroke="#7C3AED" stroke-width="0.9" opacity="0.5"/>
  <line x1="80" y1="62" x2="69" y2="79" stroke="#7C3AED" stroke-width="0.9" opacity="0.4"/>
  <line x1="91" y1="80" x2="69" y2="80" stroke="#0891b2" stroke-width="0.9" opacity="0.4"/>

  <text x="116" y="68" font-family="system-ui,sans-serif" font-weight="700" font-size="26" fill="#111827" letter-spacing="-0.5">Dark</text>
  <text x="165" y="68" font-family="system-ui,sans-serif" font-weight="700" font-size="26" fill="url(#brand)" letter-spacing="-0.5">Matter</text>

  <!-- Chain nodes -->
  <rect x="80" y="100" width="1040" height="80" rx="10" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="380" cy="140" r="10" fill="#7C3AED" opacity="0.9"/>
  <line x1="390" y1="140" x2="520" y2="140" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="530" cy="140" r="10" fill="#2563EB" opacity="0.9"/>
  <line x1="540" y1="140" x2="670" y2="140" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="680" cy="140" r="10" fill="#7C3AED" opacity="0.9"/>
  <line x1="690" y1="140" x2="750" y2="140" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <circle cx="760" cy="162" r="9" fill="#d97706" opacity="0.85"/>
  <line x1="684" y1="144" x2="756" y2="158" stroke="#d97706" stroke-width="1.2" opacity="0.6"/>

  <!-- Main text -->
  <text x="80" y="240" font-family="system-ui,sans-serif" font-weight="700" font-size="52" fill="#111827" letter-spacing="-1.5">Shared execution chain</text>
  <text x="80" y="310" font-family="monospace" font-size="20" fill="#059669">✓  chain intact  ·  replayable</text>
  <text x="80" y="360" font-family="monospace" font-size="16" fill="#6b7280">Replay any step  ·  Fork from any checkpoint  ·  Compare outputs</text>

  <!-- Primitives bar -->
  <rect x="80" y="400" width="680" height="44" rx="8" fill="#f1f3f5" stroke="#e5e7eb" stroke-width="1"/>
  <text x="420" y="428" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="url(#brand)" text-anchor="middle" letter-spacing="2">Replay  ·  Fork  ·  Compare</text>

  <!-- CTA -->
  <rect x="900" y="400" width="220" height="44" rx="8" fill="url(#brand)"/>
  <text x="1010" y="428" font-family="system-ui,sans-serif" font-weight="600" font-size="15" fill="#ffffff" text-anchor="middle">Fork this chain →</text>

  <!-- URL -->
  <text x="80" y="520" font-family="monospace" font-size="14" fill="#9ca3af">darkmatterhub.ai</text>
</svg>
